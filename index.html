<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>แอปเล่นไพ่</title>
  <link rel="stylesheet" href="style.css">

</head>
<body>

  <div class="app">

    <!-- หน้า Login -->
    <section id="loginPage" class="page" style="display:block;">
      <button onclick="showPage('adminPage')" class="btn">
  เข้าแอดมิน</button>
        <input id="playerId" placeholder="รหัสผู้เล่น">

<button onclick="loginLine()" class="btn">
  เข้าสู่ระบบ
</button>
      <div class="card center">
        <h1>แอปเล่นไพ่</h1>
        <p>เข้าสู่ระบบด้วย LINE</p>
        <button onclick="window.loginLine()" class="btn">เข้าสู่ระบบด้วย LINE</button>
      </div>
    </section>
<section id="adminPage" class="page">
    <h2>หน้าแอดมิน</h2>
    <input id="playerName" placeholder="ชื่อผู้เล่น">
    <input id="amount" type="number" placeholder="จำนวนเงิน">
  <button onclick="topUp()" class="btn">เติมเงิน</button>
  <button onclick="showPage('loginPage')" class="btn">กลับ/<button>
</section>
    <!-- หน้า Lobby -->
    <section id="lobbyPage" class="page" style="display:none;">
      <div class="topbar">
        <div>
          <h2>Lobby</h2>
          <p id="userInfo" style="color:#ffcc00; font-size:18px; font-weight:bold;"></p>
    
        </div>
        <button onclick="logout()" class="btn small">ออก</button>
      </div>

      <div class="card">
        <h3>สร้างห้อง</h3>
        <label>เงินเจ้ามือ</label>
        <input id="bankerMoney" type="number" placeholder="เช่น 5000">

        <label>แทงสูงสุดต่อคน</label>
        <input id="maxBet" type="number" placeholder="เช่น 100">

        <button onclick="createRoom()" class="btn">สร้างห้อง</button>
      </div>

      <div class="card">
        <h3>เข้าห้อง</h3>
        <input id="joinRoomId" type="number" placeholder="ใส่เลขห้อง">
        <button onclick="joinRoom()" class="btn">เข้าห้อง</button>
      </div>
    </section>

    <!-- หน้าห้องไพ่ -->
    <section id="roomPage" class="page" style="display:none;">

      <div class="topbar">
        <div>
          <h2>ห้อง <span id="roomIdText"></span></h2>
          <p>เจ้ามือ: <span id="bankerMoneyText"></span></p>
          <p>แทงสูงสุด: <span id="maxBetText"></span></p>
        </div>
        <button onclick="leaveRoom()" class="btn small danger">ออกห้อง</button>
      </div>

      <div class="casino-table">

    <div class="banker-seat">
        👑 เจ้ามือ
        <div id="bankerCards"></div>
    </div>

    <div class="table-center">
        <div id="cardsArea"></div>
        <div id="resultText">ยังไม่มีผล</div>
    </div>

    <div class="player-seat player1">
        <div id="player1"></div>
    </div>

    <div class="player-seat player2">
        <div id="player2"></div>
    </div>

    <div class="player-seat player3">
        <div id="player3"></div>
    </div>

    <div class="player-seat player4">
        <div id="player4"></div>
    </div>

    <div class="player-seat player5">
        <div id="player5"></div>
    </div>

</div>

      <div class="card" id="betCard">
  <h3>เดิมพัน</h3>

  <div id="myMoneyText"></div>

  <label>เลือกเงินแทง</label>
  <input id="betAmount" type="number" placeholder="เช่น 100"
         oninput="updateMaxLose()">

  <p>เสียสูงสุดกรณีตอง x5 : <b id="maxLoseText">0</b></p>

  <button class="btn" onclick="playerReady()">พร้อม</button>
</div>

<button
id="startGameBtn"
class="btn"
onclick="dealCards()"
style="display:none;">
เริ่มเกม
</button>
  
<button id="playerDrawBtn" class="btn" style="display:none;" onclick="playerDraw()">
ผู้เล่นจั่ว
</button>

<button id="playerStandBtn" class="btn" style="display:none;" onclick="playerStand()">
ผู้เล่นอยู่
</button>

<button id="bankerDrawBtn" class="btn" style="display:none;" onclick="bankerDraw()">
เจ้ามือจั่ว
</button>

<button id="bankerStandBtn" class="btn" style="display:none;" onclick="bankerStand()">
เจ้ามืออยู่
</button>
        
 <button id="newRoundBtn" class="btn" onclick="newRound()" style="display:none;"> เริ่มตาใหม่</button>       

<button class="btn small" onclick="copyInviteLink()">คัดลอกลิงก์เชิญ</button>
<div id="cardsArea"></div>

<div id="resultText">
ยังไม่มีผล
</div>

    </section>

  </div>

  <script src="app.js"></script>
  <script src="script.js"></script>
</body>
</html>
