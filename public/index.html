<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pok Deng Online - Multiplayer</title>
    <link rel="stylesheet" href="style.css">
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script src="/socket.io/socket.io.js"></script>
</head>
<body>
    <div id="game-container">
        <h1>♠️ ป๊อกเด้งออนไลน์ ❤️</h1>
        
        <div id="status-area">
            <p id="loading-text">กำลังโหลดข้อมูล LINE...</p>
        </div>

        <div class="table-area">
            <div id="poker-table">
                <div id="players-list"></div>
                <div id="table-message">รอผู้เล่นเข้าโต๊ะ...</div>
            </div>
        </div>

        <div id="controls" style="display: none;">
            <button id="btnJoin" class="btn-primary">เข้าเล่นเกม</button>
            <button id="btnShare" class="btn-success">🟢 ชวนเพื่อน</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
