<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>แอปเล่นไพ่</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="app">

    <!-- หน้า Login -->
    <section id="loginPage" class="page active">
      <div class="card center">
        <h1>แอปเล่นไพ่</h1>
        <p>เข้าสู่ระบบด้วย LINE</p>
        <button onclick="loginLine()" class="btn line">เข้าสู่ระบบด้วย LINE</button>
      </div>
    </section>

    <!-- หน้า Lobby -->
    <section id="lobbyPage" class="page">
      <div class="topbar">
        <div>
          <h2>Lobby</h2>
          <p id="userInfo"></p>
        </div>
        <button onclick="logout()" class="btn small">ออก</button>
      </div>

      <div class="card">
        <h3>สร้างห้อง</h3>
        <label>เงินเจ้ามือ</label>
        <input id="bankerMoney" type="number" placeholder="เช่น 5000">

        <label>แทงสูงสุดต่อคน</label>
        <input id="maxBet" type="number" placeholder="เช่น 100">

        <button onclick="createRoom()" class="btn">สร้างห้อง</button>
      </div>

      <div class="card">
        <h3>เข้าห้อง</h3>
        <input id="joinRoomId" type="number" placeholder="ใส่เลขห้อง">
        <button onclick="joinRoom()" class="btn">เข้าห้อง</button>
      </div>
    </section>

    <!-- หน้าห้องไพ่ -->
    <section id="roomPage" class="page">

      <div class="topbar">
        <div>
          <h2>ห้อง <span id="roomIdText"></span></h2>
          <p>เจ้ามือ: <span id="bankerNameText"></span></p>
          <p>แทงสูงสุด: <span id="maxBetText"></span></p>
        </div>
        <button onclick="leaveRoom()" class="btn small danger">ออกห้อง</button>
      </div>

      <div class="card">
        <h3>ผู้เล่นในห้อง</h3>
        <div id="playersList"></div>
      </div>

      <div class="card">
        <h3>เดิมพัน</h3>
        <p>เงินของฉัน: <b id="myCreditText"></b></p>

        <label>เลือกเงินแทง</label>
        <input id="betAmount" type="number" placeholder="เช่น 100" oninput="updateMaxLose()">

        <p>เสียสูงสุดกรณีตอง x5: <b id="maxLoseText">0</b></p>

        <button onclick="setReady()" class="btn">พร้อมเล่น</button>
        <button onclick="inviteLine()" class="btn line">เชิญเพื่อน LINE</button>
      </div>

      <div class="card table">
        <h3>โต๊ะไพ่</h3>
        <div id="cardsArea" class="cards">
          🂠 🂠
        </div>
        <button onclick="dealCards()" class="btn">แจกไพ่ทดลอง</button>
      </div>

      <div class="card">
        <h3>ผลตานี้</h3>
        <div id="resultText">ยังไม่มีผล</div>
      </div>

    </section>

  </div>

  <script src="app.js"></script>
</body>
</html>
